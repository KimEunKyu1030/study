<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DBeaver - Database Navigator</title>
    <style>
        :root { --bg: #1e1e1e; --sidebar: #252526; --header: #333; --text: #cccccc; --accent: #76b900; --folder: #e8a100; --border: #3c3c3c; --active: #094771; }
        body { margin:0; font-family: 'Segoe UI', 'Consolas', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; font-size: 12px; overflow: hidden; }
        
        /* 좌측 사이드바 */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; user-select: none; }
        .sidebar-title { padding: 8px 10px; background: #2d2d2d; font-size: 11px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .add-script-btn { cursor: pointer; color: var(--accent); font-size: 18px; line-height: 1; padding: 0 5px; }
        .add-script-btn:hover { color: #fff; }
        .tree-container { flex: 1; overflow-y: auto; padding: 5px 0; }
        .tree-item { padding: 4px 15px; display: flex; align-items: center; cursor: pointer; white-space: nowrap; }
        .tree-item:hover { background: #37373d; }
        .tree-item.active { background: var(--active); color: white; }
        .icon { margin-right: 6px; font-size: 14px; }
        .depth-1 { padding-left: 15px; }

        /* 메인 영역 */
        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .tabs-bar { background: #2d2d2d; height: 35px; display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab { background: #2d2d2d; padding: 8px 20px; border-right: 1px solid var(--border); color: #999; font-size: 11px; white-space: nowrap; display: flex; align-items: center; cursor: pointer; }
        .tab.active { background: var(--bg); color: #fff; border-top: 2px solid #007acc; }

        .editor-wrapper { flex: 1; display: flex; overflow: hidden; }
        .line-nums { width: 45px; background: #1e1e1e; color: #858585; text-align: right; padding: 15px 10px; border-right: 1px solid #333; font-family: 'Consolas'; font-size: 13px; line-height: 1.6; }
        .editor-area { flex: 1; padding: 15px; outline: none; white-space: pre-wrap; overflow-y: auto; line-height: 1.6; color: #9cdcfe; font-family: 'Consolas'; font-size: 14px; }
        
        h1 { color: #6a9955; font-size: 14px; font-weight: normal; margin: 0; display: inline; }
        b { color: #569cd6; font-weight: normal; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-title">
        <span>Database Navigator</span>
        <span class="add-script-btn" onclick="addNewMemo()" title="새 SQL 스크립트 추가">+</span>
    </div>
    <div class="tree-container">
        <div class="tree-item"><span class="icon">🔌</span><b>Local-MariaDB</b></div>
        <div class="tree-item depth-1"><span class="icon" style="color:var(--folder)">📁</span>Databases</div>
        <div id="memo-list"></div>
        <div class="tree-item depth-1"><span class="icon" style="color:var(--folder)">📁</span>Projects</div>
    </div>
</div>

<div class="main-content">
    <div id="tabs-container" class="tabs-bar"></div>
    <div class="editor-wrapper">
        <div class="line-nums">1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>10<br>11<br>12</div>
        <div id="editor" class="editor-area" contenteditable="true" spellcheck="false" oninput="updateContent()"></div>
    </div>
</div>

<script>
    // 데이터 로드 및 초기화
    let notes = JSON.parse(localStorage.getItem('dbeaver_final_memo')) || [
        { id: Date.now(), title: 'Script-1.sql', content: '<h1>-- 기본 메모장</h1><br><b>SELECT</b> * <b>FROM</b> workspace;' }
    ];
    let activeIdx = 0;

    function save() { localStorage.setItem('dbeaver_final_memo', JSON.stringify(notes)); }

    function render() {
        const memoList = document.getElementById('memo-list');
        const tabsContainer = document.getElementById('tabs-container');
        memoList.innerHTML = '';
        tabsContainer.innerHTML = '';

        notes.forEach((note, i) => {
            // 왼쪽 트리 아이템 추가
            const item = document.createElement('div');
            item.className = 'tree-item depth-1' + (i === activeIdx ? ' active' : '');
            item.innerHTML = '<span class="icon">📄</span>' + note.title;
            item.onclick = () => { activeIdx = i; render(); };
            memoList.appendChild(item);

            // 상단 탭 추가
            const tab = document.createElement('div');
            tab.className = 'tab' + (i === activeIdx ? ' active' : '');
            tab.innerText = note.title;
            tab.onclick = () => { activeIdx = i; render(); };
            tabsContainer.appendChild(tab);
        });

        // 에디터 내용 업데이트
        document.getElementById('editor').innerHTML = notes[activeIdx].content;
    }

    function addNewMemo() {
        const name = prompt('새 스크립트 이름을 입력하세요:', 'Script-' + (notes.length + 1) + '.sql');
        if (name) {
            notes.push({ id: Date.now(), title: name, content: '<h1>-- ' + name + '</h1><br>' });
            activeIdx = notes.length - 1;
            save();
            render();
        }
    }

    function updateContent() {
        notes[activeIdx].content = document.getElementById('editor').innerHTML;
        save();
    }

    // 초기 실행
    render();
</script>
</body>
</html>
